name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: CSC_IDENTITY_AUTO_DISCOVERY=false npm run electron:build -- --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DayCal ${{ github.ref_name }}
          body: |
            ## Install
            1. Download the `.dmg` for your Mac:
               - **Apple Silicon (M1/M2/M3/M4)** → `DayCal-*-arm64.dmg`
               - **Intel Mac** → `DayCal-*.dmg`
            2. Open the `.dmg` and drag **DayCal** to Applications
            3. Launch from Applications or your Dock

            > **First launch:** if macOS says "unidentified developer", go to **System Settings → Privacy & Security** → scroll down → click **Open Anyway**

            Your data is cloud-synced — nothing is lost when updating.
          files: dist/*.dmg
          draft: false
          prerelease: false
